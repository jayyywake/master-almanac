name: Build Master Almanac

on:
  schedule:
    # Runs at 01:00 UTC every day, an hour after the sub-calendars generate
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run harvester script
      run: python build_almanac.py

    - name: Commit and push changes
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add master_almanac.ics
        git diff-index --quiet HEAD || git commit -m "Update master almanac"
        git push
